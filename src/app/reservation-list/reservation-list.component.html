<h1>Hotel Reservations</h1>

<ul *ngIf="reservations.length; else noReservation">
    <li *ngFor="let reservation of this.reservations">
        Guest: {{reservation.guestName}} <br>
        Email: {{reservation.guestEmail}} <br>
        Room Number: {{reservation.roomNumber}} <br>
        Check-In: {{reservation.checkInDate | date:'dd.MM.yyyy'}} <br>
        Check-In: {{reservation.checkOutDate | date:'dd.MM.yyyy'}}  <br>
    </li>
</ul>

<ng-template #noReservation>
    <p>No reservation available.</p>
</ng-template>
